site_name: note
site_description: 20+年资深程序员的技术知识库 | Go、Python、AI、DevOps
site_author: deep2code
site_url: https://deep2code.github.io/note
repo_url: https://github.com/deep2code/note
repo_name: deep2code/note

theme:
        name: material
        custom_dir: overrides
        palette:
                - scheme: default
                  primary: deep purple
                  accent: amber
                  toggle:
                          icon: material/weather-sunny
                          name: Switch to dark mode
                - scheme: slate
                  primary: deep purple
                  accent: amber
                  toggle:
                          icon: material/weather-night
                          name: Switch to light mode
        font:
                text: Inter
                code: JetBrains Mono
        features:
                - navigation.instant
                - navigation.tracking
                - navigation.sections
                - navigation.expand
                - navigation.top
                - navigation.indexes
                - search.suggest
                - search.highlight
                - search.share
                - content.code.copy
                - content.code.select
                - content.code.annotate
                - content.tabs.link
                - toc.integrate
        icon:
                repo: fontawesome/brands/github
                logo: material/library

plugins:
        - search:
                  lang:
                          - en
                          - zh
                  separator: "[\\s\\u200b\\-_,:!=\\[\\]()\"`'+]*"
        - minify:
                  minify_html: true
        # - git-revision-date-localized:
        #       type: date
        #       fallback_to_build_date: true

markdown_extensions:
        - pymdownx.highlight:
                  anchor_linenums: false
                  linenums: false
                  line_spans: __span
                  pygments_lang_class: true
        - pymdownx.inlinehilite
        - pymdownx.superfences:
                  custom_fences:
                          - name: mermaid
                            class: mermaid
                            format: !!python/name:pymdownx.superfences.fence_code_format ""
        - admonition
        - pymdownx.details
        - pymdownx.mark
        - pymdownx.tilde
        - pymdownx.caret
        - pymdownx.keys
        - attr_list
        - md_in_html
        - toc:
                  permalink: true
                  toc_depth: 3
        - pymdownx.emoji:
                  emoji_index: !!python/name:material.extensions.emoji.twemoji ""
                  emoji_generator:

                          !!python/name:material.extensions.emoji.to_svg ""
extra_javascript:
        - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
        - assets/js/code-block.js
        - assets/js/custom.js

extra_css:
        - assets/css/code-block.css
        - assets/css/custom.css

extra:
        social:
                - icon: fontawesome/brands/github
                  link: https://github.com/deep2code
                - icon: fontawesome/brands/linkedin
                  link: https://linkedin.com/in/deep2code
                - icon: fontawesome/brands/twitter
                  link: https://twitter.com/deep2code
        generator: false

